<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyShift - Bus Driver Schedule Manager</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="styles.css">
    <script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js")
      .then(reg => console.log("ServiceWorker registered", reg))
      .catch(err => console.log("ServiceWorker registration failed", err));
  });
}
</script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <h1 class="app-title">MyShift</h1>
            <button class="add-shift-btn" id="addShiftBtn">+</button>
        </header>

        <!-- Week Selector -->
        <div class="week-selector">
            <!-- Week buttons will be generated by JavaScript -->
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <div class="week-view" id="weekView">
                <!-- Days will be generated by JavaScript -->
            </div>
        </main>
    </div>

    <!-- Shift Detail Modal -->
    <div class="modal" id="shiftModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Shift Details</h2>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="shift-info">
                    <div class="info-row">
                        <strong>Shift ID:</strong>
                        <span id="modalShiftId"></span>
                    </div>
                </div>
                <div class="photo-gallery" id="photoGallery">
                    <!-- Photos will be loaded here -->
                </div>
                <div class="modal-actions">
                    <button class="edit-btn" id="editShiftBtn">Edit Shift</button>
                    <button class="delete-btn" id="deleteShiftBtn">Delete Shift</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Shift Modal -->
    <div class="modal" id="addShiftModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="addModalTitle">Add New Shift</h2>
                <button class="close-btn" id="closeAddModal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="shiftForm">
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="isDayOff">
                            Mark as Day Off
                        </label>
                    </div>
                    
                    <div id="shiftDetailsFields">
                        <div class="form-group">
                            <label for="shiftDay">Day:</label>
                            <select id="shiftDay" required>
                                <option value="sunday">Sunday</option>
                                <option value="monday">Monday</option>
                                <option value="tuesday">Tuesday</option>
                                <option value="wednesday">Wednesday</option>
                                <option value="thursday">Thursday</option>
                                <option value="friday">Friday</option>
                                <option value="saturday">Saturday</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="shiftId">Shift ID:</label>
                            <input type="text" id="shiftId" required placeholder="e.g., S123">
                        </div>
                        
                        <!-- Copy to other days -->
                        <div class="form-group">
                            <label>Copy to other days:</label>
                            <div class="copy-days-container">
                                <button type="button" class="copy-day-btn" data-day="sunday">Sun</button>
                                <button type="button" class="copy-day-btn" data-day="monday">Mon</button>
                                <button type="button" class="copy-day-btn" data-day="tuesday">Tue</button>
                                <button type="button" class="copy-day-btn" data-day="wednesday">Wed</button>
                                <button type="button" class="copy-day-btn" data-day="thursday">Thu</button>
                                <button type="button" class="copy-day-btn" data-day="friday">Fri</button>
                                <button type="button" class="copy-day-btn" data-day="saturday">Sat</button>
                            </div>
                        </div>
                        
                        <!-- Photo Upload -->
                        <div class="form-group">
                            <label>📷 Upload Photo (Reference):</label>
                            <div class="photo-upload-container">
                                <button type="button" class="photo-upload-btn" id="uploadBtn">
                                    📁 Gallery
                                </button>
                                <button type="button" class="photo-upload-btn" id="cameraBtn">
                                    📷 Camera
                                </button>
                                <input type="file" id="photoInput" accept="image/*" style="display: none;">
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-actions">
                        <button type="button" class="cancel-btn" id="cancelAddShift">Cancel</button>
                        <button type="submit" class="save-btn">Save Shift</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Photo Fullscreen Modal -->
    <div class="modal" id="photoFullscreenModal">
        <div class="modal-content fullscreen-modal">
            <button class="close-btn" id="closePhotoFullscreen">&times;</button>
            <img id="fullscreenPhoto" class="fullscreen-photo" alt="Full screen photo">
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

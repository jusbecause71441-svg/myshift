<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyShift</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="MyShift">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="mainScreen">
    <div class="header">
        <h1>MyShift 🚌</h1>
        <button class="btn-add" onclick="openAddModal()">+</button>
    </div>
    <div class="week-selector" id="weekSelector"></div>
    <div class="week-view" id="weekView"></div>
</div>

<div class="modal-overlay" id="addModal">
    <div class="modal">
        <div class="modal-header">
            <h2 id="modalTitle">Add Shift</h2>
            <button class="btn-close" onclick="closeAddModal()">✕</button>
        </div>
        <div class="form-group">
            <label>Day:</label>
            <select id="daySelect" onchange="updateCopyDays()">
                <option value="Sunday">Sunday</option>
                <option value="Monday">Monday</option>
                <option value="Tuesday">Tuesday</option>
                <option value="Wednesday">Wednesday</option>
                <option value="Thursday">Thursday</option>
                <option value="Friday">Friday</option>
                <option value="Saturday">Saturday</option>
            </select>
        </div>
        <div class="form-group">
            <label>Shift ID (4 digits):</label>
            <input type="number" id="shiftIdInput" placeholder="e.g. 5905" inputmode="numeric">
        </div>
        <div class="form-group">
            <label class="checkbox-label">
                <input type="checkbox" id="dayOffCheck" onchange="toggleDayOff()">
                Mark as Day Off
            </label>
        </div>
        <div id="copyDaysSection" class="form-group">
            <label>Copy to other days:</label>
            <div class="copy-days" id="copyDaysButtons"></div>
        </div>
        <div id="dayOffDaysSection" class="form-group" style="display:none;">
            <label>Also mark as Day Off:</label>
            <div class="copy-days" id="dayOffDaysButtons"></div>
        </div>
        <div class="form-group">
            <label>📷 Upload Photo (Reference):</label>
            <div class="photo-upload-btns">
                <button class="btn-photo" onclick="document.getElementById('galleryInput').click()">🖼 Gallery</button>
                <button class="btn-photo" onclick="document.getElementById('cameraInput').click()">📷 Camera</button>
            </div>
            <input type="file" id="galleryInput" accept="image/*" style="display:none" onchange="handlePhotoSelect(event)">
            <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none" onchange="handlePhotoSelect(event)">
            <div id="photoPreviewArea"></div>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeAddModal()">Cancel</button>
            <button class="btn-save" onclick="saveShift()">Save Shift</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="detailModal">
    <div class="modal">
        <div class="modal-header">
            <h2>Shift Details</h2>
            <button class="btn-close" onclick="closeDetailModal()">✕</button>
        </div>
        <div id="detailContent"></div>
        <div class="modal-footer">
            <button class="btn-edit" onclick="editShift()">✏️ Edit</button>
            <button class="btn-delete" onclick="deleteShift()">🗑 Delete</button>
        </div>
    </div>
</div>

<div class="fullscreen-overlay" id="fullscreenPhoto" onclick="closeFullscreen()">
    <img id="fullscreenImg" src="" alt="Shift Photo">
    <button class="btn-close-fullscreen" onclick="closeFullscreen()">✕</button>
</div>

<script src="app.js"></script>
</body>
</html>

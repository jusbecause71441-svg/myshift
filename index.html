<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4a90d9">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyShift - Driver Schedule Manager</title>
    <meta name="description" content="Manage your bus driver shift schedules with ease">
    <meta name="theme-color" content="#4a90d9">
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MyShift">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
    <link rel="manifest" href="manifest.json">
    
    <link rel="stylesheet" href="styles.css">
</head>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/service-worker.js")
      .then(reg => console.log("ServiceWorker 등록 완료", reg))
      .catch(err => console.log("ServiceWorker 등록 실패", err));
  });
}
</script>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <h1 class="app-title">MyShift</h1>
            <button class="add-shift-btn" id="addShiftBtn">+</button>
        </header>

        <!-- Week Selector -->
        <div class="week-selector">
            <button class="week-btn" data-week="0">1 Mar 26</button>
            <button class="week-btn active" data-week="1">8 Mar 26</button>
            <button class="week-btn" data-week="2">15 Mar 26</button>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <div class="week-view" id="weekView">
                <!-- Days will be generated by JavaScript -->
            </div>
        </main>
    </div>

    <!-- Shift Detail Modal -->
    <div class="modal" id="shiftModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Shift Details</h2>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="shift-info">
                    <div class="info-row">
                        <label>Shift ID:</label>
                        <span id="modalShiftId"></span>
                    </div>
                    <div class="info-row">
                        <label>Sign On:</label>
                        <span id="modalSignOn"></span>
                    </div>
                    <div class="info-row">
                        <label>Finish:</label>
                        <span id="modalFinish"></span>
                    </div>
                    <div class="info-row">
                        <label>Total Hours:</label>
                        <span id="modalTotalHours"></span>
                    </div>
                </div>
                
                <div class="photo-section">
                    <h3>Photos/Screenshots</h3>
                    <div class="photo-upload">
                        <input type="file" id="photoInput" accept="image/*" multiple>
                        <div style="display: flex; gap: 0.5rem;">
                            <button class="upload-btn" id="uploadBtn">📷 Add Photos</button>
                            <button class="upload-btn" id="cameraBtn" style="background: rgba(74, 144, 217, 0.1); color: #4a90d9; border: 1px solid rgba(74, 144, 217, 0.2);">📸 Take Photo</button>
                        </div>
                    </div>
                    <div class="photo-gallery" id="photoGallery">
                        <!-- Photos will be displayed here -->
                    </div>
                </div>
                
                <div class="modal-actions">
                    <button class="delete-btn" id="deleteShiftBtn">Delete Shift</button>
                    <button class="edit-btn" id="editShiftBtn">Edit Shift</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Shift Modal -->
    <div class="modal" id="addShiftModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="addModalTitle">Add New Shift</h2>
                <button class="close-btn" id="closeAddModal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="shiftForm">
                    <div class="form-group">
                        <label for="shiftDay">Day:</label>
                        <select id="shiftDay" required>
                            <option value="monday">Monday</option>
                            <option value="tuesday">Tuesday</option>
                            <option value="wednesday">Wednesday</option>
                            <option value="thursday">Thursday</option>
                            <option value="friday">Friday</option>
                            <option value="saturday">Saturday</option>
                            <option value="sunday">Sunday</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="shiftId">Shift ID:</label>
                        <input type="text" id="shiftId" required placeholder="e.g., S123">
                    </div>
                    
                    <div class="form-group">
                        <label for="signOnTime">Sign On Time (24-hour format, e.g., 08:35 or 20:35):</label>
                        <input type="time" id="signOnTime" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="finishTime">Finish Time (24-hour format, e.g., 17:30 or 23:45):</label>
                        <input type="time" id="finishTime" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="totalHours">Total Hours:</label>
                        <div style="display: flex; gap: 0.5rem; align-items: center;">
                            <input type="number" id="totalHoursHours" min="0" max="23" required placeholder="Hours" style="flex: 1;">
                            <span style="color: #666666;">h</span>
                            <input type="number" id="totalHoursMinutes" min="0" max="59" required placeholder="Minutes" style="flex: 1;">
                            <span style="color: #666666;">m</span>
                        </div>
                    </div>
                    
                    <div class="form-actions">
                        <button type="button" class="cancel-btn" id="cancelAddShift">Cancel</button>
                        <button type="submit" class="save-btn">Save Shift</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Photo Fullscreen Modal -->
    <div class="modal" id="photoFullscreenModal">
        <div class="photo-fullscreen-container">
            <button class="photo-fullscreen-close" id="closePhotoFullscreen">&times;</button>
            <img id="fullscreenPhoto" src="" alt="Fullscreen photo">
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" href="icons/icon-192x192.png">
